name: eBiz Pipeline

on:
  push:
    branches: [main]
    paths:
      - "3/**"
      - "5/**"
      - "10/**"
      - ".github/workflows/ebiz-pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "3/**"
      - "5/**"
      - "10/**"
      - ".github/workflows/ebiz-pipeline.yml"
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 5/server/go.mod
      - name: Build Go server
        working-directory: 5/server
        run: CGO_ENABLED=0 go build -o ebiz-server .
      - uses: actions/upload-artifact@v4
        with:
          name: ebiz-server
          path: 5/server/ebiz-server
          retention-days: 7

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: 5/client/package-lock.json
      - name: Build React client
        working-directory: 5/client
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ebiz-client-dist
          path: 5/client/dist
          retention-days: 7

  build-bot-fatjar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build Kotlin fatjar (shadowJar)
        working-directory: 3
        run: ./gradlew :app:shadowJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: bot-fatjar
          path: 3/app/build/libs/*-all.jar
          retention-days: 7
