name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 5/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 5/client/package-lock.json
      - name: Zastosuj konfigurację lint z zadania 8
        run: |
          cp ../../8/3.0/overlay/package.json package.json
          cp ../../8/3.0/overlay/eslint.config.js eslint.config.js
      - run: npm install
      - run: npm run lint

  go-vet:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - 4
          - 5/server
          - 6/unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
